<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lær og Leg</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;background:linear-gradient(135deg,#0d7a5f 0%,#00c896 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px}
.card{background:#fff;border-radius:28px;box-shadow:0 24px 64px rgba(0,0,0,.22);padding:32px 28px;width:100%;max-width:500px}
h1{text-align:center;font-size:2.1rem;color:#0b5c48;margin-bottom:4px}
.sub{text-align:center;color:#999;font-size:.9rem;margin-bottom:24px}
.age-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:18px}
.age-btn{padding:20px 8px;border:none;border-radius:18px;font-size:1rem;font-weight:700;cursor:pointer;color:#fff;transition:transform .15s,box-shadow .15s}
.age-btn:hover{transform:translateY(-3px);box-shadow:0 8px 20px rgba(0,0,0,.2)}
.age-btn.a1{background:linear-gradient(135deg,#f7971e,#ffd200)}
.age-btn.a2{background:linear-gradient(135deg,#ee0979,#ff6a00)}
.age-btn.a3{background:linear-gradient(135deg,#4776e6,#8e54e9)}
.lb-open-btn{display:block;margin:0 auto;background:none;border:2px solid #ddd;border-radius:99px;padding:8px 22px;font-size:.88rem;cursor:pointer;color:#888;transition:all .2s}
.lb-open-btn:hover{border-color:#0b5c48;color:#0b5c48}
.prog-wrap{height:10px;background:#eee;border-radius:99px;margin-bottom:6px}
.prog-bar{height:100%;border-radius:99px;background:linear-gradient(90deg,#0d7a5f,#00c896);transition:width .4s}
.meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;font-size:.82rem;color:#888;gap:6px}
.score-badge{background:#f0faf7;color:#0b5c48;border-radius:99px;padding:4px 12px;font-weight:700;font-size:.88rem;white-space:nowrap}
.streak-badge{background:linear-gradient(135deg,#f97316,#ffd200);color:#fff;border-radius:99px;padding:4px 10px;font-weight:700;font-size:.82rem;white-space:nowrap}
.cat-badge{display:inline-block;padding:4px 10px;border-radius:99px;font-size:.78rem;font-weight:700;color:#fff;white-space:nowrap}
.cat-math{background:linear-gradient(135deg,#f7971e,#ffd200);color:#333}
.cat-spell{background:linear-gradient(135deg,#ee0979,#ff6a00)}
.cat-color{background:linear-gradient(135deg,#4776e6,#8e54e9)}
.q-text{font-size:1.3rem;font-weight:600;color:#222;text-align:center;min-height:52px;margin-bottom:8px;line-height:1.4}
.hint{text-align:center;color:#aaa;font-size:.85rem;margin-bottom:6px;min-height:16px}
.example-sent{text-align:center;color:#888;font-size:.92rem;font-style:italic;margin-bottom:12px;min-height:20px;font-weight:500}
.speak-btn{display:block;margin:0 auto 12px;background:#f0faf7;border:1px solid #b2ddd2;border-radius:99px;padding:8px 20px;font-size:.88rem;cursor:pointer;color:#0b5c48;transition:background .2s}
.speak-btn:hover{background:#d4f0e8}
.answer-input{width:100%;padding:14px 18px;border:2px solid #ddd;border-radius:14px;font-size:1.2rem;text-align:center;outline:none;transition:border-color .2s;margin-bottom:14px}
.answer-input:focus{border-color:#00c896}
.submit-btn{width:100%;padding:14px;border:none;border-radius:14px;background:linear-gradient(135deg,#0d7a5f,#00c896);color:#fff;font-size:1.1rem;font-weight:700;cursor:pointer;transition:transform .15s,box-shadow .15s}
.submit-btn:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(0,180,140,.35)}
/* COLORING */
#colorSection{display:none;flex-direction:column;align-items:center}
.color-title{font-size:1.1rem;font-weight:700;color:#333;margin-bottom:8px;text-align:center}
.color-legend{display:flex;gap:7px;margin-bottom:10px;flex-wrap:wrap;justify-content:center}
.legend-item{display:flex;align-items:center;gap:4px;font-size:.8rem;font-weight:600;color:#555}
.legend-swatch{width:18px;height:18px;border-radius:4px;border:2px solid rgba(0,0,0,.12);flex-shrink:0}
.palette{display:flex;gap:10px;margin-bottom:10px;justify-content:center;flex-wrap:wrap}
.pal-btn{width:46px;height:46px;border-radius:12px;border:3px solid transparent;cursor:pointer;transition:transform .15s,border-color .15s;font-size:.72rem;font-weight:700;color:rgba(0,0,0,.45)}
.pal-btn:hover{transform:scale(1.1)}
.pal-btn.selected{border-color:#111 !important;transform:scale(1.18);box-shadow:0 4px 12px rgba(0,0,0,.28)}
#pixelGrid{display:inline-grid;gap:2px;margin-bottom:10px;background:#e5e7eb;border-radius:10px;padding:6px}
.cell{border-radius:4px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.68rem;font-weight:700;color:rgba(0,0,0,.4);background:#f9fafb;border:1px solid #e5e7eb;transition:background .12s,transform .1s;user-select:none}
.cell:hover:not(.bg){transform:scale(1.06);border-color:#aaa}
.cell.bg{background:#f3f4f6;border-color:#e5e7eb;cursor:default;pointer-events:none}
.cell.painted{color:transparent;border-color:rgba(255,255,255,.3)}
.cell.wrong-show{border:2px solid #ef4444 !important;animation:wrongPulse .6s ease}
@keyframes wrongPulse{0%,100%{opacity:1}50%{opacity:.4}}
.cell.wrong-flash{animation:wFlash .35s ease}
@keyframes wFlash{0%{background:#fca5a5}100%{background:#f9fafb}}
.progress-count{font-size:.82rem;color:#888;margin-bottom:8px;text-align:center}
.color-done-btn{padding:13px 30px;border:none;border-radius:14px;background:linear-gradient(135deg,#4776e6,#8e54e9);color:#fff;font-size:1rem;font-weight:700;cursor:pointer;transition:transform .15s;margin-top:4px}
.color-done-btn:hover{transform:translateY(-2px)}
/* TOAST */
.toast{position:fixed;top:24px;left:50%;transform:translateX(-50%) translateY(-80px);background:#fff;border-radius:16px;padding:14px 28px;font-size:1.05rem;font-weight:700;box-shadow:0 8px 30px rgba(0,0,0,.2);transition:transform .35s cubic-bezier(.34,1.56,.64,1);z-index:999;text-align:center;min-width:220px}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.ok{color:#16a34a;border-left:6px solid #16a34a}
.toast.no{color:#ef4444;border-left:6px solid #ef4444}
.toast.streak{color:#f97316;border-left:6px solid #f97316}
/* OVERLAYS */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;padding:16px;z-index:100;overflow-y:auto}
.overlay.hidden{display:none}
.end-card{background:#fff;border-radius:24px;padding:36px 28px;max-width:460px;width:100%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.end-card h2{font-size:2rem;margin-bottom:8px;color:#0b5c48}
.end-emoji{font-size:3.5rem;margin-bottom:10px}
.end-score{font-size:1.2rem;color:#555;margin-bottom:6px}
.end-max{font-size:.85rem;color:#aaa;margin-bottom:16px}
.stars{font-size:2rem;margin-bottom:16px;letter-spacing:4px}
.stat-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:20px}
.stat-box{background:#f0faf7;border-radius:14px;padding:14px}
.stat-label{font-size:.78rem;color:#888;margin-bottom:4px}
.stat-val{font-size:1.4rem;font-weight:700;color:#0b5c48}
/* Save score */
.save-section{margin-bottom:18px}
.save-section p{font-size:.9rem;color:#666;margin-bottom:8px}
.name-row{display:flex;gap:8px}
.name-input{flex:1;padding:11px 14px;border:2px solid #ddd;border-radius:12px;font-size:1rem;outline:none;transition:border-color .2s}
.name-input:focus{border-color:#00c896}
.save-btn{padding:11px 18px;border:none;border-radius:12px;background:linear-gradient(135deg,#0d7a5f,#00c896);color:#fff;font-size:.9rem;font-weight:700;cursor:pointer;white-space:nowrap}
/* Leaderboard table */
.lb-age-title{font-size:.95rem;font-weight:700;color:#0b5c48;margin:16px 0 6px;text-align:left}
.lb-table{width:100%;border-collapse:collapse;font-size:.85rem;margin-bottom:8px}
.lb-table th{padding:6px 8px;text-align:left;color:#888;font-weight:600;border-bottom:2px solid #f0f0f0}
.lb-table td{padding:6px 8px;border-bottom:1px solid #f5f5f5}
.lb-table tr:first-child td{font-weight:700;color:#f97316}
.lb-row-me td{background:#f0faf7;font-weight:700}
.restart-btn{width:100%;padding:14px;border:none;border-radius:14px;background:linear-gradient(135deg,#0d7a5f,#00c896);color:#fff;font-size:1.1rem;font-weight:700;cursor:pointer;transition:transform .15s}
.restart-btn:hover{transform:translateY(-2px)}

.lb-full-card{background:#fff;border-radius:24px;padding:32px 28px;max-width:460px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.3);max-height:90vh;overflow-y:auto}
.lb-full-card h2{font-size:1.6rem;color:#0b5c48;margin-bottom:20px;text-align:center}
.lb-close-btn{width:100%;padding:12px;border:none;border-radius:14px;background:#f0faf7;color:#0b5c48;font-size:1rem;font-weight:700;cursor:pointer;margin-top:16px}
#confetti{position:fixed;inset:0;pointer-events:none;z-index:50}
.hidden{display:none!important}
</style>
</head>

// SPEECH
// ═══════════════════════════════════════════════════════════
let daVoice=null;
function loadVoices(){
  const all=speechSynthesis.getVoices();
  if(!all.length) return;
  daVoice=all.find(v=>v.lang.startsWith('da')&&v.name.toLowerCase().includes('google'))
    ||all.find(v=>v.lang.startsWith('da'))
    ||all.find(v=>v.lang.startsWith('nb')||v.lang.startsWith('no'))||null;
}
speechSynthesis.onvoiceschanged=loadVoices; loadVoices();
let currentWord='';
function speak(){
  if(!currentWord) return;
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(currentWord);
  u.lang='da-DK'; u.rate=0.75;
  if(daVoice) u.voice=daVoice;
  speechSynthesis.speak(u);
}

// ═══════════════════════════════════════════════════════════
// MATH GENERATOR
// ═══════════════════════════════════════════════════════════
function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a}
function genMath(ag){
  if(ag===0){
    const t=rnd(0,3);
    if(t===0){const a=rnd(1,9),b=rnd(1,10-a);return{q:`${a} + ${b} = ?`,a:String(a+b)}}
    if(t===1){const a=rnd(2,10),b=rnd(1,a-1);return{q:`${a} − ${b} = ?`,a:String(a-b)}}
    if(t===2){const tb=[2,5,10],v=tb[rnd(0,2)],n=rnd(1,5);return{q:`${n} × ${v} = ?`,a:String(n*v)}}
    const n=rnd(1,10)*2;return{q:`Hvad er halvdelen af ${n}?`,a:String(n/2)}
  }
  if(ag===1){
    const t=rnd(0,5);
    if(t===0){const a=rnd(10,99),b=rnd(10,99);return{q:`${a} + ${b} = ?`,a:String(a+b)}}
    if(t===1){const a=rnd(20,99),b=rnd(10,a);return{q:`${a} − ${b} = ?`,a:String(a-b)}}
    if(t===2){const a=rnd(2,9),b=rnd(2,9);return{q:`${a} × ${b} = ?`,a:String(a*b)}}
    if(t===3){const a=rnd(2,9),b=rnd(2,9);return{q:`${a*b} ÷ ${a} = ?`,a:String(b)}}
    if(t===4){const n=rnd(2,20)*2;return{q:`Hvad er halvdelen af ${n}?`,a:String(n/2)}}
    const n=rnd(2,10)*5;return{q:`Hvad er det dobbelte af ${n}?`,a:String(n*2)}
  }
  const t=rnd(0,6);
  if(t===0){const a=rnd(100,999),b=rnd(100,999);return{q:`${a} + ${b} = ?`,a:String(a+b)}}
  if(t===1){const a=rnd(200,999),b=rnd(100,a-1);return{q:`${a} − ${b} = ?`,a:String(a-b)}}
  if(t===2){const a=rnd(11,25),b=rnd(11,25);return{q:`${a} × ${b} = ?`,a:String(a*b)}}
  if(t===3){const ps=[10,20,25,50],p=ps[rnd(0,3)],b=rnd(1,10)*20;return{q:`Hvad er ${p}% af ${b}?`,a:String(b*p/100)}}
  if(t===4){const n=rnd(2,12);return{q:`${n}² = ?`,a:String(n*n)}}
  if(t===5){const b=rnd(5,30),x=rnd(3,25);return{q:`x + ${b} = ${x+b}, hvad er x?`,a:String(x)}}
  const a=rnd(-15,5),b2=rnd(-15,5);return{q:`${a} + (${b2}) = ?`,a:String(a+b2)}
}

// ═══════════════════════════════════════════════════════════
// LEADERBOARD
// ═══════════════════════════════════════════════════════════
const AGE_LABELS=['4–6 år','7–10 år','10–12 år'];
function lbKey(ag){return`scores_age_${ag}`}
function loadScores(ag){
  try{return JSON.parse(localStorage.getItem(lbKey(ag)))||[]}catch{return[]}
}
function addScore(ag,name,pts){
  const scores=loadScores(ag);
  scores.push({name:name.trim()||'Anonym',score:pts,date:new Date().toLocaleDateString('da-DK')});
  scores.sort((a,b)=>b.score-a.score);
  const trimmed=scores.slice(0,10);
  localStorage.setItem(lbKey(ag),JSON.stringify(trimmed));
  return trimmed;
}
function renderLbTable(ag,highlightIdx=-1){
  const scores=loadScores(ag);
  if(!scores.length) return`<p style="color:#aaa;font-size:.85rem;padding:8px 0">Ingen scores endnu.</p>`;
  let html=`<table class="lb-table"><thead><tr><th>#</th><th>Navn</th><th>Point</th><th>Dato</th></tr></thead><tbody>`;
  scores.slice(0,5).forEach((s,i)=>{
    const cls=i===highlightIdx?'lb-row-me':'';
    const medal=i===0?'🥇':i===1?'🥈':i===2?'🥉':i+1+'.';
    html+=`<tr class="${cls}"><td>${medal}</td><td>${s.name}</td><td>${s.score}</td><td>${s.date}</td></tr>`;
  });
  return html+`</tbody></table>`;
}
function openLbOverlay(){
  let html='';
  for(let ag=0;ag<3;ag++){
    html+=`<div class="lb-age-title">${AGE_LABELS[ag]}</div>${renderLbTable(ag)}`;
  }
  document.getElementById('lbFullContent').innerHTML=html;
  document.getElementById('lbOverlay').classList.remove('hidden');
}
function saveAndShow(){
  const name=document.getElementById('nameInput').value;
  const scores=addScore(age,name,totalScore);
  const myIdx=scores.findIndex(s=>s.name===(name.trim()||'Anonym')&&s.score===totalScore);
  document.getElementById('saveSection').classList.add('hidden');
  const sec=document.getElementById('endLbSection');
  sec.classList.remove('hidden');
  sec.innerHTML=`<div class="lb-age-title">🏆 Topscorer – ${AGE_LABELS[age]}</div>${renderLbTable(age,myIdx)}<br>`;
}

// ═══════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════
let age,sequence,idx,totalScore,streak,stats,usedWords;
let selectedColor=1,userColors=[],currentAnimal=null;
const TOTAL=15;
const MAX_POSSIBLE=39; // max hvis streak altid er 5+

function calcPoints(s){return Math.min(3,Math.ceil(s/2))}

function buildSequence(){
  const seq=[];
  for(let i=0;i<15;i++){
    if((i+1)%5===0) seq.push('color');
    else seq.push(i%2===0?'math':'spell');
  }
  return seq;
}

function startGame(ag){
  age=ag; totalScore=0; streak=0; idx=0;
  stats={math:{c:0,t:0},spell:{c:0,t:0},color:{c:0,t:0}};
  usedWords=new Set();
  sequence=buildSequence();
  document.getElementById('startScreen').classList.add('hidden');
  document.getElementById('gameScreen').classList.remove('hidden');
  updateStreakUI();
  showActivity();
}

function showActivity(){
  updateMeta(sequence[idx]);
  if(sequence[idx]==='color') showColoring();
  else showQA(sequence[idx]);
}

function updateMeta(type){
  document.getElementById('progBar').style.width=`${(idx/TOTAL)*100}%`;
  document.getElementById('qCnt').textContent=`Opgave ${idx+1} af ${TOTAL}`;
  document.getElementById('scoreTxt').textContent=totalScore;
  const b=document.getElementById('catBadge');
  if(type==='math'){b.textContent='🔢 Regning';b.className='cat-badge cat-math'}
  else if(type==='spell'){b.textContent='🔤 Stavning';b.className='cat-badge cat-spell'}
  else{b.textContent='🎨 Farvning';b.className='cat-badge cat-color'}
}

function updateStreakUI(){
  const sb=document.getElementById('streakBadge');
  if(streak>=2){
    sb.classList.remove('hidden');
    document.getElementById('streakTxt').textContent=streak;
  } else {
    sb.classList.add('hidden');
  }
  document.getElementById('scoreTxt').textContent=totalScore;
}

// ═══════════════════════════════════════════════════════════
// Q&A
// ═══════════════════════════════════════════════════════════
function showQA(type){
  document.getElementById('qaSection').style.display='';
  document.getElementById('colorSection').style.display='none';
  currentWord='';
  const inp=document.getElementById('inp');
  if(type==='math'){
    const {q,a}=genMath(age);
    document.getElementById('qText').textContent=q;
    document.getElementById('hintTxt').textContent='';
    document.getElementById('exampleSent').textContent='';
    document.getElementById('speakBtn').classList.add('hidden');
    inp.setAttribute('data-answer',a.toLowerCase());
  } else {
    const pool=WORDS[age];
    const unused=pool.filter(p=>!usedWords.has(p.w));
    const chosen=unused.length?unused[rnd(0,unused.length-1)]:pool[rnd(0,pool.length-1)];
    usedWords.add(chosen.w);
    currentWord=chosen.w;
    document.getElementById('qText').textContent='Hvad er ordet?';
    document.getElementById('hintTxt').textContent=chosen.h;
    document.getElementById('exampleSent').textContent=chosen.s;
    document.getElementById('speakBtn').classList.remove('hidden');
    inp.setAttribute('data-answer',chosen.w.toLowerCase());
    setTimeout(()=>speak(),350);
  }
  inp.value=''; inp.focus();
  inp.onkeydown=e=>{if(e.key==='Enter')submit()};
}

function norm(s){return s.trim().toLowerCase().replace(/\s+/g,'')}

function submit(){
  const inp=document.getElementById('inp');
  const user=norm(inp.value);
  const correct=norm(inp.getAttribute('data-answer'));
  const key=sequence[idx]==='math'?'math':'spell';
  stats[key].t++;
  if(user===correct){
    streak++;
    const pts=calcPoints(streak);
    totalScore+=pts;
    stats[key].c++;
    updateStreakUI();
    let msg;
    if(streak>=5) msg=`${streak} i træk! 🔥 +${pts} point`;
    else if(streak>=3) msg=`${streak} korrekte i træk! +${pts} point 🎉`;
    else msg=`${pickCheer()} +${pts} point`;
    toast(msg,streak>=3?'streak':'ok');
    fireConfetti();
  } else {
    streak=0;
    updateStreakUI();
    toast(`Forkert. Svaret var: ${inp.getAttribute('data-answer')} 😊`,'no');
  }
  advance();
}

function pickCheer(){return['Rigtigt!','Super!','Korrekt!','Perfekt!','Ja!','Bravo!'][rnd(0,5)]}

// ═══════════════════════════════════════════════════════════
// COLORING
// ═══════════════════════════════════════════════════════════
function showColoring(){
  document.getElementById('qaSection').style.display='none';
  document.getElementById('colorSection').style.display='flex';
  currentAnimal=ANIMALS[rnd(0,ANIMALS.length-1)];
  document.getElementById('colorTitle').textContent=`🎨 Farvelæg: ${currentAnimal.name}`;
  const usedIdx=[...new Set(currentAnimal.grid.filter(v=>v>0))].sort();

  // legend
  const leg=document.getElementById('colorLegend');
  leg.innerHTML='';
  usedIdx.forEach(ci=>{
    const d=document.createElement('div');
    d.className='legend-item';
    d.innerHTML=`<div class="legend-swatch" style="background:${currentAnimal.pal[ci].h}"></div><span>${ci} = ${currentAnimal.pal[ci].n}</span>`;
    leg.appendChild(d);
  });

  // palette
  const pal=document.getElementById('palette');
  pal.innerHTML='';
  selectedColor=usedIdx[0];
  usedIdx.forEach(ci=>{
    const btn=document.createElement('button');
    btn.className='pal-btn'+(ci===selectedColor?' selected':'');
    btn.style.background=currentAnimal.pal[ci].h;
    btn.title=currentAnimal.pal[ci].n;
    btn.textContent=ci;
    btn.onclick=()=>{
      selectedColor=ci;
      pal.querySelectorAll('.pal-btn').forEach(b=>b.classList.remove('selected'));
      btn.classList.add('selected');
    };
    pal.appendChild(btn);
  });

  // grid
  const gridEl=document.getElementById('pixelGrid');
  gridEl.innerHTML='';
  const cols=currentAnimal.cols;
  const avail=Math.min(500,window.innerWidth)-56-20;
  const cs=Math.min(42,Math.floor((avail-(cols-1)*2)/cols));
  gridEl.style.gridTemplateColumns=`repeat(${cols},${cs}px)`;
  userColors=currentAnimal.grid.map(()=>0);

  currentAnimal.grid.forEach((val,i)=>{
    const cell=document.createElement('div');
    cell.className='cell';
    cell.style.width=cs+'px'; cell.style.height=cs+'px';
    if(val===0){
      cell.classList.add('bg');
    } else {
      cell.textContent=val;
      cell.dataset.idx=i;
      cell.onclick=()=>{
        // always allow re-painting
        userColors[i]=selectedColor;
        cell.style.background=currentAnimal.pal[selectedColor].h;
        cell.textContent='';
        cell.classList.add('painted');
        updateColorCount();
      };
    }
    gridEl.appendChild(cell);
  });

  stats.color.t++;
  updateColorCount();
}

function updateColorCount(){
  const total=currentAnimal.grid.filter(v=>v>0).length;
  const painted=userColors.filter((v,i)=>currentAnimal.grid[i]>0&&v>0).length;
  document.getElementById('colorCount').textContent=`${painted} / ${total} felter malet`;
}

function submitColoring(){
  // Check all cells
  let allRight=true;
  const cells=document.querySelectorAll('#pixelGrid .cell:not(.bg)');
  cells.forEach(cell=>{
    const i=parseInt(cell.dataset.idx);
    const correct=currentAnimal.grid[i];
    if(userColors[i]!==correct){
      allRight=false;
      cell.classList.add('wrong-show');
      setTimeout(()=>cell.classList.remove('wrong-show'),800);
    }
  });

  if(allRight){
    streak++;
    const pts=calcPoints(streak);
    totalScore+=pts;
    stats.color.c++;
    updateStreakUI();
    toast(`Perfekt farvelægning! 🎨 +${pts} point`,'ok');
    fireConfetti();
  } else {
    streak=0;
    updateStreakUI();
    toast('Ikke helt rigtigt – forkerte felter blinker rødt. 0 point.','no');
  }
  advance();
}

// ═══════════════════════════════════════════════════════════
// ADVANCE + END
// ═══════════════════════════════════════════════════════════
function advance(){
  idx++;
  if(idx>=TOTAL) setTimeout(showEnd,1100);
  else setTimeout(showActivity,900);
}

function showEnd(){
  const pct=totalScore/MAX_POSSIBLE;
  let emoji,stars;
  if(pct>=.75){emoji='🏆';stars='⭐⭐⭐'}
  else if(pct>=.45){emoji='🎉';stars='⭐⭐'}
  else{emoji='💪';stars='⭐'}
  document.getElementById('endEmoji').textContent=emoji;
  document.getElementById('endScore').textContent=`Du scorede ${totalScore} point`;
  document.getElementById('endMax').textContent=`(maks muligt: ${MAX_POSSIBLE} point)`;
  document.getElementById('endStars').textContent=stars;
  const fmt=s=>`${s.c}/${s.t}`;
  document.getElementById('sMath').textContent=fmt(stats.math);
  document.getElementById('sSpell').textContent=fmt(stats.spell);
  document.getElementById('sColor').textContent=fmt(stats.color);
  // reset save section
  document.getElementById('saveSection').classList.remove('hidden');
  document.getElementById('endLbSection').classList.add('hidden');
  document.getElementById('nameInput').value='';
  document.getElementById('overlay').classList.remove('hidden');
  document.getElementById('progBar').style.width='100%';
}

function restart(){
  document.getElementById('overlay').classList.add('hidden');
  document.getElementById('gameScreen').classList.add('hidden');
  document.getElementById('startScreen').classList.remove('hidden');
}

// ═══════════════════════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════════════════════
let toastT;
function toast(msg,cls){
  const el=document.getElementById('toast');
  el.textContent=msg; el.className=`toast ${cls} show`;
  clearTimeout(toastT); toastT=setTimeout(()=>el.classList.remove('show'),2400);
}

// ═══════════════════════════════════════════════════════════
// CONFETTI
// ═══════════════════════════════════════════════════════════
(()=>{
  const cv=document.getElementById('confetti'),cx=cv.getContext('2d');
  let pieces=[];
  const resize=()=>{cv.width=innerWidth;cv.height=innerHeight};
  addEventListener('resize',resize);resize();
  class P{constructor(){this.x=Math.random()*cv.width;this.y=-10;this.w=rnd(6,12);this.h=rnd(3,6);this.color=`hsl(${rnd(0,360)},80%,60%)`;this.rot=Math.random()*Math.PI*2;this.vy=rnd(2,5);this.vx=(Math.random()-.5)*3;this.vr=(Math.random()-.5)*.2;this.alpha=1}}
  (function loop(){cx.clearRect(0,0,cv.width,cv.height);pieces=pieces.filter(p=>p.alpha>0);pieces.forEach(p=>{p.y+=p.vy;p.x+=p.vx;p.rot+=p.vr;if(p.y>cv.height*.7)p.alpha-=.025;cx.save();cx.globalAlpha=p.alpha;cx.translate(p.x,p.y);cx.rotate(p.rot);cx.fillStyle=p.color;cx.fillRect(-p.w/2,-p.h/2,p.w,p.h);cx.restore()});requestAnimationFrame(loop)})();
  window.fireConfetti=()=>{for(let i=0;i<70;i++)pieces.push(new P())};
})();
</script>
